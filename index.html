<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekstrak Nama Module require()</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #333;
      --text: #e0e0e0;
      --accent: #007acc;
      --green: #4ec94e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    h1 {
      font-size: 1.8rem;
      color: #ffffff;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    textarea {
      width: 100%;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #d4d4d4;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      transition: border 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.8rem 1.6rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    button:hover { background: #1a8cd8; }
    button:active { transform: scale(0.98); }
    button.secondary {
      background: #2d2d2d;
      border: 1px solid var(--border);
    }
    button.secondary:hover { background: #3a3a3a; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .badge {
      background: var(--green);
      color: #000;
      padding: 0.2rem 0.7rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .note {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
    }
    .example-btn {
      background: transparent;
      border: 1px dashed #555;
      color: #aaa;
      font-size: 0.8rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📦 Nama Module require()</h1>
  <p class="note">
    Ekstrak <strong>nama module</strong> dari kode Lua (seperti hasil dekompilasi).<br>
    Mendeteksi <code>require(…:WaitForChild("NamaModule"))</code> dan juga string biasa.
  </p>

  <!-- Input -->
  <div>
    <textarea id="inputCode" rows="14" placeholder="Paste script Lua di sini..."></textarea>
  </div>

  <!-- Tombol -->
  <div class="btn-group">
    <button id="generateBtn">⚡ Generate</button>
    <button id="clearBtn" class="secondary">🗑️ Clear</button>
    <button id="exampleBtn" class="example-btn">📋 Contoh (dari script tadi)</button>
  </div>

  <!-- Output -->
  <div>
    <div class="output-header">
      <span style="font-weight: 600;">📋 Nama Module</span>
      <span id="countBadge" class="badge">0 modul</span>
    </div>
    <textarea id="outputArea" rows="10" readonly placeholder="Nama module akan muncul di sini, satu per baris..."></textarea>
  </div>

  <!-- Copy -->
  <button id="copyBtn">📄 Copy ke Clipboard</button>
</div>

<script>
  (function() {
    const inputCode = document.getElementById('inputCode');
    const outputArea = document.getElementById('outputArea');
    const countBadge = document.getElementById('countBadge');
    const generateBtn = document.getElementById('generateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const exampleBtn = document.getElementById('exampleBtn');

    // Contoh input langsung dari script decompile yang kamu kirim (ringkasan)
    const exampleCode = `-- Decompiled with x2125.xyz
local Players = game:GetService("Players")
local ReplicatedStorage = game:GetService("ReplicatedStorage")
local RunService = game:GetService("RunService")
local SoundService = game:GetService("SoundService")
local Workspace = game:GetService("Workspace")
local Debris = game:GetService("Debris")
local Events = ReplicatedStorage:WaitForChild("Events")
local FootballShotRequest = Events:WaitForChild("FootballShotRequest")
local FootballShotResult = Events:WaitForChild("FootballShotResult")
local FootballSwipeShotRequest = Events:WaitForChild("FootballSwipeShotRequest")
local FootballSwipeInput = require(script.Parent:WaitForChild("FootballSwipeInput"))
local FootballSwipeConfig = require(ReplicatedStorage:WaitForChild("FootballSwipeConfig"))
local FootballManualSwipeBoostHud = require(script.Parent:WaitForChild("FootballManualSwipeBoostHud"))
local FootballManualShotQueue = require(script.Parent:WaitForChild("FootballManualShotQueue"))
local PerfectShotKickClient = require(script.Parent:WaitForChild("PerfectShotKickClient"))
local FootballCriticalHitText = require(script.Parent:WaitForChild("FootballCriticalHitText"))
local FootballAimHereLabel = require(script.Parent:WaitForChild("FootballAimHereLabel"))
local FootballPitchReskin = Events:WaitForChild("FootballPitchReskin")
local FootballGoalRewardUpdated = Events:WaitForChild("FootballGoalRewardUpdated")
local BallKick = SoundService:WaitForChild("SFX"):WaitForChild("BallKick")
local Block = SoundService:WaitForChild("SFX"):WaitForChild("Block")
local Outside = SoundService:WaitForChild("SFX"):WaitForChild("Outside")
local Score = SoundService:WaitForChild("SFX"):WaitForChild("Score")
Block.Volume = 0.45
Outside.Volume = 0.45
local HideUIClientsideEvent = Events:WaitForChild("HideUIClientsideEvent")
local ShowUIClientsideEvent = Events:WaitForChild("ShowUIClientsideEvent")
local FootballShopData = require(ReplicatedStorage:WaitForChild("FootballShopData"))
local FootballFieldCenters = require(ReplicatedStorage:WaitForChild("FootballFieldCenters"))
local FootballLuckyBlockGoalConfig = require(ReplicatedStorage:WaitForChild("FootballLuckyBlockGoalConfig"))
local FootballGoalieBigVariant = require(ReplicatedStorage:WaitForChild("FootballGoalieBigVariant"))
local FootballKickSlots = require(ReplicatedStorage:WaitForChild("FootballKickSlots"))
local FootballShotRestingSpots = require(script.Parent:WaitForChild("FootballShotRestingSpots"))
local FootballSlotClaim = Events:WaitForChild("FootballSlotClaim")
local FootballSlotRelease = Events:WaitForChild("FootballSlotRelease")
local FootballPitchState = ReplicatedStorage:WaitForChild("FootballPitchState")
local function getKickAssignModeFromABTest() --[[ Line: 47 ]]
	return ReplicatedStorage:WaitForChild("Functions"):WaitForChild("GetABTestData"):InvokeServer("KickAssignMode")
end`;

    // Masukkan contoh ketika tombol diklik
    exampleBtn.addEventListener('click', () => {
      inputCode.value = exampleCode;
      outputArea.value = '';
      countBadge.textContent = '0 modul';
    });

    /**
     * Ekstrak nama module.
     * Prioritas:
     * 1. require(…:WaitForChild("NamaModule")) → ambil NamaModule
     * 2. require("…") / require('…') → ambil komponen terakhir (setelah / atau .)
     */
    function extractModuleNames(code) {
      const names = [];
      const seen = new Set();

      // Pola 1: require(...:WaitForChild("...") atau WaitForChild('...')
      const waitForChildRegex = /require\s*\(\s*[^)]*:WaitForChild\s*\(\s*(["'])(.+?)\1\s*\)\s*\)/g;
      let match;
      while ((match = waitForChildRegex.exec(code)) !== null) {
        const name = match[2]; // string di dalam WaitForChild
        if (!seen.has(name)) {
          seen.add(name);
          names.push(name);
        }
      }

      // Pola 2: require("...") atau require('...') – fallback, ambil nama terakhir
      const stringRequireRegex = /require\s*\(\s*(["'])(.+?)\1\s*\)/g;
      while ((match = stringRequireRegex.exec(code)) !== null) {
        let fullPath = match[2];
        // Ambil bagian terakhir setelah pemisah
        let shortName = fullPath.split(/[\/.]/).pop(); // Ambil setelah / atau .
        // Hapus karakter yang bukan identifier (jarang terjadi)
        shortName = shortName.replace(/[^a-zA-Z0-9_]/g, '');
        if (shortName && !seen.has(shortName)) {
          seen.add(shortName);
          names.push(shortName);
        }
      }

      // Pola 3: require "..." atau require '...' (tanpa kurung)
      const bareRequireRegex = /require\s+(["'])(.+?)\1/g;
      while ((match = bareRequireRegex.exec(code)) !== null) {
        let fullPath = match[2];
        let shortName = fullPath.split(/[\/.]/).pop();
        shortName = shortName.replace(/[^a-zA-Z0-9_]/g, '');
        if (shortName && !seen.has(shortName)) {
          seen.add(shortName);
          names.push(shortName);
        }
      }

      return names;
    }

    function generateOutput() {
      const code = inputCode.value.trim();
      if (code === '') {
        outputArea.value = '⚠️ Masukkan kode Lua terlebih dahulu.';
        countBadge.textContent = '0 modul';
        return;
      }
      const mods = extractModuleNames(code);
      if (mods.length === 0) {
        outputArea.value = '❌ Tidak ditemukan module yang di‑require.';
        countBadge.textContent = '0 modul';
      } else {
        // Buat daftar bernomor
        const lines = mods.map((mod, idx) => `${idx + 1}. ${mod}`);
        outputArea.value = lines.join('\n');
        countBadge.textContent = `${mods.length} modul`;
      }
    }

    function copyOutput() {
      const text = outputArea.value;
      if (!text || text.startsWith('⚠️') || text.startsWith('❌')) {
        alert('Tidak ada hasil untuk disalin.');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        const origHTML = copyBtn.innerHTML;
        copyBtn.innerHTML = '✅ Tersalin!';
        copyBtn.style.background = '#2e7d32';
        setTimeout(() => {
          copyBtn.innerHTML = origHTML;
          copyBtn.style.background = '';
        }, 1500);
      }).catch(() => {
        outputArea.select();
        document.execCommand('copy');
        alert('Disalin (fallback).');
      });
    }

    function clearAll() {
      inputCode.value = '';
      outputArea.value = '';
      countBadge.textContent = '0 modul';
    }

    generateBtn.addEventListener('click', generateOutput);
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyOutput);

    // Ctrl+Enter untuk generate
    inputCode.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        generateOutput();
      }
    });
  })();
</script>
</body>
</html>
