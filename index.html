<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekstrak Modul require() - Lua Script</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #333;
      --text: #e0e0e0;
      --accent: #007acc;
      --green: #4ec94e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    h1 {
      font-size: 1.8rem;
      color: #ffffff;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    textarea {
      width: 100%;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #d4d4d4;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      transition: border 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.8rem 1.6rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    button:hover { background: #1a8cd8; }
    button:active { transform: scale(0.98); }
    button.secondary {
      background: #2d2d2d;
      border: 1px solid var(--border);
    }
    button.secondary:hover { background: #3a3a3a; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .badge {
      background: var(--green);
      color: #000;
      padding: 0.2rem 0.7rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .note {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📦 Ekstrak Module require()</h1>
  <p class="note">Tempel kode Lua hasil dekompilasi, lalu klik <strong>Generate</strong> untuk mendapatkan daftar modul yang di‑<em>require</em>.</p>

  <!-- Input -->
  <div>
    <textarea id="inputCode" rows="14" placeholder="Paste script Lua di sini..."></textarea>
  </div>

  <!-- Tombol -->
  <div class="btn-group">
    <button id="generateBtn">⚡ Generate</button>
    <button id="clearBtn" class="secondary">🗑️ Clear</button>
  </div>

  <!-- Output -->
  <div>
    <div class="output-header">
      <span style="font-weight: 600;">📋 Hasil Ekstraksi</span>
      <span id="countBadge" class="badge">0 modul</span>
    </div>
    <textarea id="outputArea" rows="10" readonly placeholder="Daftar modul akan muncul di sini..."></textarea>
  </div>

  <!-- Copy -->
  <button id="copyBtn">📄 Copy ke Clipboard</button>

  <p class="note" style="margin-top:1rem;">Regex mendeteksi: <code>require("...")</code>, <code>require('...')</code>, dan <code>require "..."</code></p>
</div>

<script>
  (function() {
    // Elemen
    const inputCode = document.getElementById('inputCode');
    const outputArea = document.getElementById('outputArea');
    const countBadge = document.getElementById('countBadge');
    const generateBtn = document.getElementById('generateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    /**
     * Ekstrak semua string yang di-require.
     * Menangani:
     *   require("module")
     *   require('module')
     *   require "module"   (jarang, tapi kadang ada)
     *   require( ... ) dengan whitespace bebas.
     */
    function extractModules(code) {
      // Regex dengan dua alternatif:
      // 1. require(...) dengan tanda kurung, string di dalamnya
      // 2. require "..." atau require '...' tanpa kurung
      const regex = /require\s*\(\s*(?:"([^"]*)"|'([^']*)')\s*\)|require\s+(?:"([^"]*)"|'([^']*)')/g;
      const modules = [];
      let match;
      while ((match = regex.exec(code)) !== null) {
        // match[1] = petik ganda dalam kurung
        // match[2] = petik tunggal dalam kurung
        // match[3] = petik ganda tanpa kurung
        // match[4] = petik tunggal tanpa kurung
        const modName = match[1] || match[2] || match[3] || match[4];
        if (modName && modules.indexOf(modName) === -1) {
          modules.push(modName);
        }
      }
      return modules;
    }

    function generateOutput() {
      const code = inputCode.value.trim();
      if (code === '') {
        outputArea.value = '⚠️ Masukkan kode Lua terlebih dahulu.';
        countBadge.textContent = '0 modul';
        return;
      }
      const mods = extractModules(code);
      if (mods.length === 0) {
        outputArea.value = '❌ Tidak ditemukan modul dengan require().';
        countBadge.textContent = '0 modul';
      } else {
        // Buat daftar bernomor
        const lines = mods.map((mod, idx) => `${idx + 1}. ${mod}`);
        outputArea.value = lines.join('\n');
        countBadge.textContent = `${mods.length} modul`;
      }
    }

    function copyOutput() {
      const text = outputArea.value;
      if (!text || text.startsWith('⚠️') || text.startsWith('❌')) {
        alert('Tidak ada hasil untuk disalin.');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        // Feedback sementara pada tombol
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '✅ Tersalin!';
        copyBtn.style.background = '#2e7d32';
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
          copyBtn.style.background = '';
        }, 1500);
      }).catch(() => {
        // Fallback untuk browser lama
        outputArea.select();
        document.execCommand('copy');
        alert('Disalin (fallback).');
      });
    }

    function clearAll() {
      inputCode.value = '';
      outputArea.value = '';
      countBadge.textContent = '0 modul';
    }

    // Event listeners
    generateBtn.addEventListener('click', generateOutput);
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyOutput);

    // Opsional: enter di input tidak submit form (hanya textarea)
    inputCode.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        generateOutput();
      }
    });
  })();
</script>
</body>
</html>
